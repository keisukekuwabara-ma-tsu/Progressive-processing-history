<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title id="pageTitle">順送プレス加工実績入力</title>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
 <style>
 :root {
 --bg-color: #0d0e12;
 --card-bg: #161820;
 --text-color: #e2e8f0;
 --accent-color: #00adb5;
 --accent-glow: rgba(0, 173, 181, 0.4);
 --border-color: #262936;
 --input-bg: #1f222f;
 --success-color: #10b981;
 --error-color: #ef4444;
 }
  
 body {
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
 background-color: var(--bg-color);
 color: var(--text-color);
 margin: 0;
 padding: 16px;
 display: flex;
 flex-direction: column;
 align-items: center;
 -webkit-font-smoothing: antialiased;
 }
  
 .container {
 width: 100%;
 max-width: 500px;
 display: flex;
 flex-direction: column;
 gap: 16px;
 margin-bottom: 80px;
 }
  
 h1 {
 font-size: 1.25rem;
 font-weight: 700;
 text-align: center;
 margin: 8px 0;
 color: #fff;
 letter-spacing: 0.05em;
 }
  
 .lang-selector {
 display: flex;
 justify-content: flex-end;
 gap: 8px;
 }
  
 .lang-btn {
 background: var(--card-bg);
 border: 1px solid var(--border-color);
 color: var(--text-color);
 padding: 6px 12px;
 font-size: 0.8rem;
 border-radius: 20px;
 cursor: pointer;
 transition: all 0.2s;
 }
  
 .lang-btn.active {
 background: var(--accent-color);
 color: #000;
 font-weight: bold;
 border-color: var(--accent-color);
 box-shadow: 0 0 10px var(--accent-glow);
 }
  
 .card {
 background-color: var(--card-bg);
 border-radius: 12px;
 border: 1px solid var(--border-color);
 padding: 20px;
 box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
 }
  
 .form-group {
 display: flex;
 flex-direction: column;
 gap: 8px;
 margin-bottom: 16px;
 position: relative;
 }
  
 .form-group:last-child {
 margin-bottom: 0;
 }
  
 label {
 font-size: 0.85rem;
 font-weight: 600;
 color: #94a3b8;
 }
  
 select, input {
 background-color: var(--input-bg);
 border: 1px solid var(--border-color);
 color: var(--text-color);
 border-radius: 8px;
 padding: 12px;
 font-size: 1rem;
 transition: all 0.2s;
 width: 100%;
 box-sizing: border-box;
 outline: none;
 -webkit-appearance: none;
 appearance: none;
 }
  
 select:focus, input:focus {
 border-color: var(--accent-color);
 box-shadow: 0 0 0 3px var(--accent-glow);
 }
  
 select {
 background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
 background-repeat: no-repeat;
 background-position: right 12px center;
 background-size: 16px;
 padding-right: 40px;
 }
  
 .barcode-btn {
 position: absolute;
 right: 6px;
 bottom: 6px;
 background: var(--accent-color);
 border: none;
 color: #000;
 width: 36px;
 height: 36px;
 border-radius: 6px;
 cursor: pointer;
 display: flex;
 align-items: center;
 justify-content: center;
 }
  
 .barcode-btn svg {
 width: 20px;
 height: 20px;
 fill: currentColor;
 }
  
 .submit-btn {
 background: var(--accent-color);
 color: #000;
 border: none;
 border-radius: 8px;
 padding: 14px;
 font-size: 1rem;
 font-weight: 700;
 cursor: pointer;
 width: 100%;
 transition: all 0.2s;
 margin-top: 8px;
 box-shadow: 0 4px 12px var(--accent-glow);
 }
  
 .submit-btn:disabled {
 background: #475569;
 color: #1e293b;
 box-shadow: none;
 cursor: not-allowed;
 }
  
 /* カメラ枠のCSS調整（iPad/タブレットのレイアウト崩れ対策） */
 #interactive {
 width: 100%;
 max-width: 640px;
 aspect-ratio: 4 / 3;
 background: #000;
 border-radius: 8px;
 overflow: hidden;
 margin-bottom: 16px;
 position: relative;
 display: none;
 margin-left: auto;
 margin-right: auto;
 }
  
 #interactive video,
 #interactive canvas.drawingBuffer {
 width: 100%;
 height: 100%;
 object-fit: cover;
 position: absolute;
 top: 0;
 left: 0;
 }
  
 /* Canvasのタッチ操作を無効化（Quaggaの描画レイヤー） */
 #interactive canvas.drawingBuffer {
 pointer-events: none;
 z-index: 2;
 }
  
 .scan-overlay {
 position: absolute;
 top: 0; left: 0; width: 100%; height: 100%;
 border: 2px solid var(--accent-color);
 box-sizing: border-box;
 pointer-events: none;
 box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
 display: flex;
 align-items: center;
 justify-content: center;
 z-index: 3;
 }
  
 .scan-line {
 width: 90%;
 height: 2px;
 background: var(--error-color);
 position: absolute;
 animation: scan 2s linear infinite;
 box-shadow: 0 0 8px var(--error-color);
 }
  
 @keyframes scan {
 0% { top: 10%; }
 50% { top: 90%; }
 100% { top: 10%; }
 }
  
 .close-scan-btn {
 position: absolute;
 top: 8px;
 right: 8px;
 background: rgba(0,0,0,0.7);
 border: 1px solid var(--border-color);
 color: #fff;
 border-radius: 4px;
 padding: 4px 8px;
 font-size: 0.75rem;
 cursor: pointer;
 z-index: 10;
 }
  
 #msg {
 padding: 12px;
 border-radius: 8px;
 font-size: 0.9rem;
 text-align: center;
 display: none;
 font-weight: 600;
 }
  
 #msg.success {
 background-color: rgba(16, 185, 129, 0.15);
 border: 1px solid var(--success-color);
 color: #34d399;
 }
  
 #msg.error {
 background-color: rgba(239, 68, 68, 0.15);
 border: 1px solid var(--error-color);
 color: #f87171;
 }
  
 .hidden { display: none !important; }
  
 .master-target-box {
 background: #1f293d;
 border-left: 4px solid var(--accent-color);
 padding: 12px;
 border-radius: 0 8px 8px 0;
 margin-top: 4px;
 font-size: 0.9rem;
 }
  
 .judge-box {
 display: inline-block;
 padding: 2px 8px;
 border-radius: 4px;
 font-weight: bold;
 font-size: 0.85rem;
 margin-left: 8px;
 }
  
 .judge-ok { background-color: #065f46; color: #34d399; }
 .judge-ng { background-color: #991b1b; color: #f87171; }
  
 .defect-box {
 margin-top: 12px;
 background: #2a1f2d;
 border: 1px solid #5b21b6;
 border-radius: 8px;
 padding: 12px;
 }
  
 .defect-title {
 color: #c084fc;
 font-weight: bold;
 font-size: 0.85rem;
 margin-bottom: 6px;
 display: flex;
 align-items: center;
 gap: 6px;
 }
  
 .defect-img {
 width: 100%;
 max-height: 180px;
 object-fit: contain;
 border-radius: 4px;
 margin-top: 8px;
 background: #111;
 }
  
 .section-title {
 font-size: 0.95rem;
 font-weight: 700;
 color: #94a3b8;
 margin: 24px 0 8px 0;
 letter-spacing: 0.05em;
 text-transform: uppercase;
 }
  
 .history-list {
 display: flex;
 flex-direction: column;
 gap: 12px;
 }
  
 .history-card {
 background: var(--card-bg);
 border: 1px solid var(--border-color);
 border-radius: 12px;
 padding: 16px;
 position: relative;
 }
  
 .history-card.warning-card {
 border-color: #b45309;
 background: linear-gradient(145deg, #161820 0%, #251c14 100%);
 }
  
 .warning-badge {
 position: absolute;
 top: 12px;
 right: 12px;
 background: #b45309;
 color: #fff;
 font-size: 0.7rem;
 font-weight: bold;
 padding: 2px 6px;
 border-radius: 4px;
 }
  
 .history-header {
 display: flex;
 justify-content: space-between;
 align-items: flex-start;
 border-bottom: 1px solid var(--border-color);
 padding-bottom: 8px;
 margin-bottom: 12px;
 }
  
 .history-coil {
 font-size: 1rem;
 font-weight: 700;
 color: #fff;
 }
  
 .history-meta {
 font-size: 0.8rem;
 color: #64748b;
 margin-top: 2px;
 }
  
 .history-stages {
 display: flex;
 flex-direction: column;
 gap: 8px;
 }
  
 .stage-row {
 display: flex;
 align-items: center;
 justify-content: space-between;
 font-size: 0.85rem;
 background: #1f222f;
 padding: 8px 12px;
 border-radius: 6px;
 }
  
 .stage-label {
 font-weight: bold;
 min-width: 32px;
 }
  
 .stage-label.st-start { color: #38bdf8; }
 .stage-label.st-middle { color: #fbbf24; }
 .stage-label.st-end { color: #34d399; }
  
 .stage-info {
 flex-grow: 1;
 margin-left: 12px;
 color: #cbd5e1;
 }
  
 .stage-edit-btn {
 background: transparent;
 border: 1px solid var(--accent-color);
 color: var(--accent-color);
 padding: 2px 8px;
 font-size: 0.75rem;
 border-radius: 4px;
 cursor: pointer;
 transition: all 0.2s;
 }
  
 .stage-edit-btn:hover {
 background: var(--accent-color);
 color: #000;
 }
  
 .coil-support-container {
 display: flex;
 flex-direction: column;
 gap: 8px;
 background: var(--card-bg);
 border: 1px solid var(--border-color);
 border-radius: 12px;
 padding: 16px;
 }
  
 .coil-support-title {
 font-size: 0.85rem;
 font-weight: bold;
 color: #fbbf24;
 margin-bottom: 4px;
 }
  
 .coil-badge-grid {
 display: flex;
 flex-wrap: wrap;
 gap: 8px;
 }
  
 .coil-badge {
 background: #1f222f;
 border: 1px solid #334155;
 color: #cbd5e1;
 padding: 6px 12px;
 font-size: 0.85rem;
 border-radius: 6px;
 cursor: pointer;
 transition: all 0.2s;
 }
  
 .coil-badge:hover {
 border-color: var(--accent-color);
 color: #fff;
 }
  
 .loading-overlay {
 position: fixed;
 top: 0; left: 0; width: 100%; height: 100%;
 background: rgba(13,14,18,0.8);
 display: flex;
 justify-content: center;
 align-items: center;
 z-index: 9999;
 display: none;
 }
  
 .spinner {
 width: 40px;
 height: 40px;
 border: 4px solid rgba(0,173,181,0.1);
 border-top: 4px solid var(--accent-color);
 border-radius: 50%;
 animation: spin 1s linear infinite;
 }
  
 @keyframes spin {
 0% { transform: rotate(0deg); }
 100% { transform: rotate(360deg); }
 }
 </style>
</head>
<body>
  
 <div class="container">
 <div class="lang-selector">
 <button class="lang-btn active" onclick="switchLang('ja')">JP</button>
 <button class="lang-btn" onclick="switchLang('id')">ID</button>
 <button class="lang-btn" onclick="switchLang('pt')">PT</button>
 </div>
  
 <h1 id="mainTitle">順送プレス加工実績入力</h1>
  
 <div id="msg"></div>
  
 <div class="card">
 <form id="pressForm" onsubmit="handleSubmit(event)">
  
 <div class="form-group">
 <label id="lblCoilNo" for="coilNo">コイルNo</label>
 <input type="text" id="coilNo" required autocomplete="off" onchange="handleCoilChange()">
 <button type="button" class="barcode-btn" onclick="startScan()">
 <svg viewBox="0 0 24 24"><path d="M4 4h2v16H4V4zm4 0h1v16H8V4zm2 0h3v16h-3V4zm5 0h1v16h-1V4zm3 0h2v16h-2V4z"/></svg>
 </button>
 </div>
  
 <div id="interactive">
 <button type="button" class="close-scan-btn" onclick="stopScan()">Close</button>
 <div class="scan-overlay">
 <div class="scan-line"></div>
 </div>
 </div>
  
 <div id="dynamic-area" class="hidden">
 <div class="form-group">
 <label id="lblMachine" for="machine">設備・機械</label>
 <select id="machine" required>
 <option value="">-- 選択してください --</option>
 <option value="Aプレス">Aプレス</option>
 <option value="Bプレス">Bプレス</option>
 <option value="Cプレス">Cプレス</option>
 </select>
 </div>
  
 <div class="form-group">
 <label id="lblProductName" for="productName">品名</label>
 <select id="productName" required onchange="handleProductChange()">
 </select>
 </div>
  
 <div class="master-target-box">
 <span id="lblMasterTarget">マスタ実寸基準値:</span> 
 <strong id="masterTargetDisplay"></strong> 
 <span id="judgeDisplay" class="judge-box hidden"></span>
 </div>
  
 <div id="defect-area" class="defect-box hidden">
 <div class="defect-title">
 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
 <span id="lblDefectTitle">過去の不具合・注意点</span>
 </div>
 <div id="defectText" style="font-size:0.9rem; color:#e2e8f0; white-space:pre-wrap;"></div>
 <img id="defectImg" class="defect-img hidden" src="" alt="Defect Image">
 </div>
  
 <div class="form-group" style="margin-top:16px;">
 <label id="lblWorker" for="worker">作業者</label>
 <select id="worker" required>
 </select>
 </div>
  
 <div class="form-group">
 <label id="lblMeasured" for="measured">測定値 (実寸)</label>
 <input type="text" id="measured" inputmode="decimal" required oninput="evaluateValue()">
 </div>
  
 <div class="form-group hidden" id="quantity-field">
 <label id="lblQuantity" for="quantity">加工数量</label>
 <input type="number" id="quantity" min="1">
 </div>
  
 <button type="submit" id="submitBtn" class="submit-btn">登録する</button>
 </div>
 </form>
 </div>
  
 <div id="coilSupportArea" class="coil-support-container hidden">
 <div class="coil-support-title" id="lblCoilSupportTitle">加工途中のコイル (タップで自動入力)</div>
 <div class="coil-badge-grid" id="coilBadgeGrid"></div>
 </div>
  
 <div class="section-title" id="lblHistoryTitle">本日の加工履歴 (直近)</div>
 <div class="history-list" id="historyList"></div>
 </div>
  
 <div class="loading-overlay" id="loadingOverlay">
 <div class="spinner"></div>
 </div>
  
 <script>
 const GAS_URL = 'https://script.google.com/macros/s/AKfycby532f6-FofgE_gLALeXWJAtT9ZfU9M6WvLNoYhVskC2Z6wL1-uO8i-KxVofbY5Maw7/exec';
  
 const LANG_DATA = {
 ja: {
 pageTitle: "順送プレス加工実績入力",
 mainTitle: "順送プレス加工実績入力",
 lblCoilNo: "コイルNo",
 lblMachine: "設備・機械",
 lblProductName: "品名",
 lblMasterTarget: "マスタ実寸基準値:",
 lblDefectTitle: "過去の不具合・注意点",
 lblWorker: "作業者",
 lblMeasured: "測定値 (実寸)",
 lblQuantity: "加工数量",
 submitBtnStart: "【始】登録する",
 submitBtnMiddle: "【中】登録する",
 submitBtnEnd: "【終】登録する",
 lblCoilSupportTitle: "加工途中のコイル (タップで自動入力)",
 lblHistoryTitle: "加工履歴 (直近)",
 selectPlaceholder: "-- 選択してください --",
 loading: "通信中...",
 successSaved: "正常に保存されました",
 errCoilNotFound: "指定されたコイルNoは在庫にありません",
 errMasterNotFound: "マスタに合致する品名が見つかりません",
 warningCard: "前日以前の未完了データ",
 labelStart: "始",
 labelMiddle: "中",
 labelEnd: "終",
 labelQty: "数量:"
 },
 id: {
 pageTitle: "Input Hasil Kerja Press",
 mainTitle: "Input Hasil Kerja Press",
 lblCoilNo: "No Koil",
 lblMachine: "Mesin",
 lblProductName: "Nama Produk",
 lblMasterTarget: "Nilai Standar Master:",
 lblDefectTitle: "Cacat/Catatan Masa Lalu",
 lblWorker: "Operator",
 lblMeasured: "Nilai Ukur (Ukuran Nyata)",
 lblQuantity: "Jumlah Proses",
 submitBtnStart: "【Awal】Daftarkan",
 submitBtnMiddle: "【Tengah】Daftarkan",
 submitBtnEnd: "【Akhir】Daftarkan",
 lblCoilSupportTitle: "Koil Sedang Diproses (Ketuk untuk input)",
 lblHistoryTitle: "Riwayat Proses (Terbaru)",
 selectPlaceholder: "-- Silakan pilih --",
 loading: "Memproses...",
 successSaved: "Berhasil disimpan",
 errCoilNotFound: "No Koil tidak ada di stok",
 errMasterNotFound: "Nama produk tidak cocok di master",
 warningCard: "Data belum selesai dari hari sebelumnya",
 labelStart: "Awal",
 labelMiddle: "Tgh",
 labelEnd: "Akhir",
 labelQty: "Jumlah:"
 },
 pt: {
 pageTitle: "Entrada de Resultados de Prensa",
 mainTitle: "Entrada de Resultados de Prensa",
 lblCoilNo: "Nº da Bobina",
 lblMachine: "Máquina",
 lblProductName: "Nome do Produto",
 lblMasterTarget: "Valor Padrão do Master:",
 lblDefectTitle: "Defeitos/Avisos Anteriores",
 lblWorker: "Operador",
 lblMeasured: "Valor Medido (Tam. Real)",
 lblQuantity: "Quantidade Processada",
 submitBtnStart: "【Início】Registrar",
 submitBtnMiddle: "【Meio】Registrar",
 submitBtnEnd: "【Fim】Registrar",
 lblCoilSupportTitle: "Bobinas em Processo (Toque para inserir)",
 lblHistoryTitle: "Histórico de Processo (Recente)",
 selectPlaceholder: "-- Por favor selecione --",
 loading: "Processando...",
 successSaved: "Salvo com sucesso",
 errCoilNotFound: "Nº da bobina não está no estoque",
 errMasterNotFound: "Nome do produto não encontrado no master",
 warningCard: "Dados incompletos do dia anterior",
 labelStart: "Ini",
 labelMiddle: "Meio",
 labelEnd: "Fim",
 labelQty: "Qtd:"
 }
 };
  
 let currentLang = 'ja';
 let currentProducts = [];
 let targetValue = null;
 let nextStage = '始';
  
 window.addEventListener('DOMContentLoaded', async () => {
 showOverlay();
 try {
 await loadWorkers();
 await loadRecentHistory();
 await refreshCoilSupportList();
 } catch(e) {
 alert('Initial load error: ' + e);
 } finally {
 hideOverlay();
 }
 document.getElementById('coilNo').focus();
 });
  
 function switchLang(lang) {
 currentLang = lang;
 document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
 event.target.classList.add('active');
  
 const dict = LANG_DATA[lang];
 document.getElementById('pageTitle').textContent = dict.pageTitle;
 document.getElementById('mainTitle').textContent = dict.mainTitle;
 document.getElementById('lblCoilNo').textContent = dict.lblCoilNo;
 document.getElementById('lblMachine').textContent = dict.lblMachine;
 document.getElementById('lblProductName').textContent = dict.lblProductName;
 document.getElementById('lblMasterTarget').textContent = dict.lblMasterTarget;
 document.getElementById('lblDefectTitle').textContent = dict.lblDefectTitle;
 document.getElementById('lblWorker').textContent = dict.lblWorker;
 document.getElementById('lblMeasured').textContent = dict.lblMeasured;
 document.getElementById('lblQuantity').textContent = dict.lblQuantity;
 document.getElementById('lblCoilSupportTitle').textContent = dict.lblCoilSupportTitle;
 document.getElementById('lblHistoryTitle').textContent = dict.lblHistoryTitle;
  
 updateSubmitButtonLabel();
 renderDefectTranslation();
  
 const machSelect = document.getElementById('machine');
 if (machSelect && machSelect.options[0]) {
 machSelect.options[0].textContent = dict.selectPlaceholder;
 }
  
 loadRecentHistory();
 refreshCoilSupportList();
 }
  
 function updateSubmitButtonLabel() {
 const btn = document.getElementById('submitBtn');
 if(nextStage === '始') btn.textContent = LANG_DATA[currentLang].submitBtnStart;
 else if(nextStage === '中') btn.textContent = LANG_DATA[currentLang].submitBtnMiddle;
 else if(nextStage === '終') btn.textContent = LANG_DATA[currentLang].submitBtnEnd;
 }
  
 function showOverlay() { document.getElementById('loadingOverlay').style.display = 'flex'; }
 function hideOverlay() { document.getElementById('loadingOverlay').style.display = 'none'; }
  
 async function callGAS(action, params = {}) {
 const payload = { action: action, ...params };
 const res = await fetch(GAS_URL, {
 method: 'POST',
 body: JSON.stringify(payload)
 });
 if (!res.ok) throw new Error('Network error');
 const json = await res.json();
 if (json.error) throw new Error(json.error);
 return json;
 }
  
 async function loadWorkers() {
 try {
 const list = await callGAS('getWorkers');
 const select = document.getElementById('worker');
 select.innerHTML = '';
  
 const dict = LANG_DATA[currentLang];
 const opt0 = document.createElement('option');
 opt0.value = '';
 opt0.textContent = dict.selectPlaceholder;
 select.appendChild(opt0);
  
 list.forEach(w => {
 const opt = document.createElement('option');
 opt.value = w;
 opt.textContent = w;
 select.appendChild(opt);
 });
 } catch(e) {
 console.error(e);
 }
 }
  
 async function handleCoilChange() {
 const coilNo = document.getElementById('coilNo').value.trim();
 const msgDiv = document.getElementById('msg');
 msgDiv.style.display = 'none';
  
 if (!coilNo) {
 document.getElementById('dynamic-area').classList.add('hidden');
 return;
 }
  
 showOverlay();
 try {
 const res = await callGAS('getProducts', { coilNo: coilNo });
 if (!res.success) {
 msgDiv.className = 'error';
 msgDiv.textContent = res.msg;
 msgDiv.style.display = 'block';
 document.getElementById('dynamic-area').classList.add('hidden');
 return;
 }
  
 currentProducts = res.products;
 setupProductSelect(res.products);
 determineNextStage(coilNo);
 document.getElementById('dynamic-area').classList.remove('hidden');
  
 } catch(e) {
 msgDiv.className = 'error';
 msgDiv.textContent = e.message;
 msgDiv.style.display = 'block';
 } finally {
 hideOverlay();
 }
 }
  
 function setupProductSelect(products) {
 const select = document.getElementById('productName');
 select.innerHTML = '';
 products.forEach(p => {
 const opt = document.createElement('option');
 opt.value = p.name;
 opt.textContent = p.name;
 select.appendChild(opt);
 });
 handleProductChange();
 }
  
 function handleProductChange() {
 const select = document.getElementById('productName');
 const selectedName = select.value;
 const prod = currentProducts.find(p => p.name === selectedName);
  
 if (prod) {
 targetValue = parseFloat(prod.measured);
 document.getElementById('masterTargetDisplay').textContent = targetValue ? targetValue.toFixed(2) : '-';
 renderDefectTranslation();
 } else {
 targetValue = null;
 document.getElementById('masterTargetDisplay').textContent = '-';
 document.getElementById('defect-area').classList.add('hidden');
 }
 resetJudge();
 evaluateValue();
 }
  
 function renderDefectTranslation() {
 const select = document.getElementById('productName');
 if(!select) return;
 const selectedName = select.value;
 const prod = currentProducts.find(p => p.name === selectedName);
 const defectArea = document.getElementById('defect-area');
  
 if (!prod || !prod.defect || !prod.defect.ja) {
 defectArea.classList.add('hidden');
 return;
 }
  
 let text = prod.defect[currentLang] || prod.defect['ja'];
 document.getElementById('defectText').textContent = text;
  
 const img = document.getElementById('defectImg');
 if (prod.image) {
 img.src = prod.image;
 img.classList.remove('hidden');
 } else {
 img.classList.add('hidden');
 }
 defectArea.classList.remove('hidden');
 }
  
 async function determineNextStage(coilNo) {
 try {
 const activeCoils = await callGAS('getActiveCoils');
 if (activeCoils.includes(coilNo)) {
 nextStage = '中'; 
 } else {
 nextStage = '始';
 }
 } catch(e) {
 nextStage = '始';
 }
 document.getElementById('quantity-field').classList.add('hidden');
 document.getElementById('quantity').required = false;
 updateSubmitButtonLabel();
 }
  
 function resetJudge() {
 const j = document.getElementById('judgeDisplay');
 j.className = 'judge-box hidden';
 j.textContent = '';
 }
  
 function evaluateValue() {
 const valStr = document.getElementById('measured').value.trim();
 const j = document.getElementById('judgeDisplay');
  
 if (valStr === '損' || valStr === 'SON' || valStr === 'son') {
 j.className = 'judge-box judge-ng';
 j.textContent = '損';
 j.classList.remove('hidden');
  
 if(nextStage !== '始') {
 document.getElementById('quantity-field').classList.remove('hidden');
 document.getElementById('quantity').required = true;
 nextStage = '終';
 updateSubmitButtonLabel();
 }
 return;
 }
  
 if(nextStage === '終' && valStr !== '損' && valStr !== 'SON' && valStr !== 'son') {
 determineNextStage(document.getElementById('coilNo').value.trim());
 }
  
 const val = parseFloat(valStr);
 if (isNaN(val) || targetValue === null) {
 resetJudge();
 return;
 }
  
 const diff = Math.abs(val - targetValue);
 if (diff <= 0.05) {
 j.className = 'judge-box judge-ok';
 j.textContent = 'OK';
 } else {
 j.className = 'judge-box judge-ng';
 j.textContent = 'NG';
 }
 j.classList.remove('hidden');
 }
  
 async function handleSubmit(e) {
 e.preventDefault();
 const msgDiv = document.getElementById('msg');
 const submitBtn = document.getElementById('submitBtn');
  
 msgDiv.style.display = 'none';
 submitBtn.disabled = true;
 showOverlay();
  
 const logData = {
 coilNo: document.getElementById('coilNo').value.trim(),
 machine: document.getElementById('machine').value,
 productName: document.getElementById('productName').value,
 worker: document.getElementById('worker').value,
 measured: document.getElementById('measured').value.trim(),
 enforcedStage: nextStage,
 quantity: document.getElementById('quantity').value
 };
  
 try {
 const res = await callGAS('saveLog', { logData: logData });
 hideOverlay();
 submitBtn.disabled = false;
 msgDiv.className = 'success';
 msgDiv.textContent = `【${res.type}】 ${LANG_DATA[currentLang].successSaved}`;
 msgDiv.style.display = 'block';
  
 document.getElementById('coilNo').value = '';
 document.getElementById('measured').value = '';
 document.getElementById('quantity').value = '';
 document.getElementById('quantity-field').classList.add('hidden');
 document.getElementById('quantity').required = false;
 document.getElementById('dynamic-area').classList.add('hidden');
 currentProducts = [];
 targetValue = null;
 nextStage = '始';
 document.getElementById('masterTargetDisplay').textContent = '';
 resetJudge();
  
 await loadRecentHistory();
 await refreshCoilSupportList();
 document.getElementById('coilNo').focus();
 } catch(err) {
 hideOverlay();
 submitBtn.disabled = false;
 msgDiv.className = 'error';
 msgDiv.textContent = err.message;
 msgDiv.style.display = 'block';
 }
 }
  
 async function loadRecentHistory() {
 try {
 const list = await callGAS('getHistory');
 const container = document.getElementById('historyList');
 container.innerHTML = '';
  
 const dict = LANG_DATA[currentLang];
  
 list.forEach(item => {
 const card = document.createElement('div');
 card.className = 'history-card';
 if (item.isWarning) {
 card.classList.add('warning-card');
 const b = document.createElement('div');
 b.className = 'warning-badge';
 b.textContent = dict.warningCard;
 card.appendChild(b);
 }
  
 const header = document.createElement('div');
 header.className = 'history-header';
 header.innerHTML = `
 <div>
 <div class="history-coil">${item.coilNo}</div>
 <div class="history-meta">${item.machine} / ${item.productName}</div>
 </div>
 `;
 card.appendChild(header);
  
 const stages = document.createElement('div');
 stages.className = 'history-stages';
  
 if (item.start) {
 stages.appendChild(createStageRow(dict.labelStart, 'st-start', item.start, item, '始'));
 }
 if (item.middle) {
 stages.appendChild(createStageRow(dict.labelMiddle, 'st-middle', item.middle, item, '中'));
 } else if (item.start && !item.end) {
 stages.appendChild(createEmptyStageRow(dict.labelMiddle, 'st-middle', item, '中'));
 }
 if (item.end) {
 let qtyStr = item.end.qty ? ` <span style="margin-left:8px; color:#fbbf24;">${dict.labelQty}${item.end.qty}</span>` : '';
 stages.appendChild(createStageRow(dict.labelEnd, 'st-end', item.end, item, '終', qtyStr));
 } else if (item.start) {
 stages.appendChild(createEmptyStageRow(dict.labelEnd, 'st-end', item, '終'));
 }
  
 card.appendChild(stages);
 container.appendChild(card);
 });
 } catch(e) {
 console.error(e);
 }
 }
  
 function createStageRow(label, labelClass, stageData, fullItem, stageName, extraHtml = '') {
 const row = document.createElement('div');
 row.className = 'stage-row';
  
 let judgeClass = '';
 let judgeText = '';
 if (stageData.measured === '損') {
 judgeClass = 'judge-ng'; judgeText = '損';
 } else if (stageData.measured && fullItem.baseTarget) {
 const diff = Math.abs(parseFloat(stageData.measured) - fullItem.baseTarget);
 if (diff <= 0.05) { judgeClass = 'judge-ok'; judgeText = 'OK'; }
 else { judgeClass = 'judge-ng'; judgeText = 'NG'; }
 }
  
 const jHtml = judgeText ? `<span class="judge-box ${judgeClass}">${judgeText}</span>` : '';
  
 row.innerHTML = `
 <div class="stage-label ${labelClass}">${label}</div>
 <div class="stage-info">
 <span>${stageData.worker} / ${stageData.measured || '-'} ${jHtml}${extraHtml}</span>
 <div style="font-size:0.7rem; color:#64748b; margin-top:2px;">${stageData.time}</div>
 </div>
 `;
  
 const btn = document.createElement('button');
 btn.type = 'button';
 btn.className = 'stage-edit-btn';
 btn.textContent = currentLang === 'ja' ? '修正' : (currentLang === 'id' ? 'Ubah' : 'Corriger');
 btn.onclick = () => {
 triggerStageEdit(fullItem.coilNo, fullItem.productName, stageName, stageData.worker, stageData.measured, stageData.qty || '', fullItem.machine);
 };
 row.appendChild(btn);
  
 return row;
 }
  
 function createEmptyStageRow(label, labelClass, fullItem, stageName) {
 const row = document.createElement('div');
 row.className = 'stage-row';
 row.style.opacity = '0.5';
 row.innerHTML = `
 <div class="stage-label ${labelClass}">${label}</div>
 <div class="stage-info">---</div>
 `;
  
 const btn = document.createElement('button');
 btn.type = 'button';
 btn.className = 'stage-edit-btn';
 btn.textContent = currentLang === 'ja' ? '登録' : (currentLang === 'id' ? 'Daftar' : 'Reg');
 btn.onclick = () => {
 triggerStageEdit(fullItem.coilNo, fullItem.productName, stageName, '', '', '', fullItem.machine);
 };
 row.appendChild(btn);
 return row;
 }
  
 function triggerStageEdit(coilNo, productName, stageName, worker, measured, qty, machineFromCard) {
 document.getElementById('coilNo').value = coilNo;
  
 handleCoilChange().then(() => {
 document.getElementById('productName').value = productName;
 handleProductChange();
  
 if (machineFromCard) {
 document.getElementById('machine').value = machineFromCard;
 }
 if (worker) {
 document.getElementById('worker').value = worker;
 }
  
 document.getElementById('measured').value = measured;
 evaluateValue();
  
 nextStage = stageName;
 updateSubmitButtonLabel();
  
 if (stageName === '終') {
 document.getElementById('quantity-field').classList.remove('hidden');
 document.getElementById('quantity').required = (measured === '損' || measured === 'SON' || measured === 'son' || qty !== '');
 document.getElementById('quantity').value = qty;
 } else {
 document.getElementById('quantity-field').classList.add('hidden');
 document.getElementById('quantity').required = false;
 document.getElementById('quantity').value = '';
 }
  
 document.getElementById('measured').focus();
 window.scrollTo({ top: 0, behavior: 'smooth' });
 });
 }
  
 async function refreshCoilSupportList() {
 try {
 const activeCoils = await callGAS('getActiveCoils');
 const area = document.getElementById('coilSupportArea');
 const grid = document.getElementById('coilBadgeGrid');
 grid.innerHTML = '';
  
 if (!activeCoils || activeCoils.length === 0) {
 area.classList.add('hidden');
 return;
 }
  
 activeCoils.forEach(coil => {
 const b = document.createElement('button');
 b.type = 'button';
 b.className = 'coil-badge';
 b.textContent = coil;
 b.onclick = () => {
 document.getElementById('coilNo').value = coil;
 handleCoilChange();
 };
 grid.appendChild(b);
 });
 area.classList.remove('hidden');
 } catch(e) {
 console.error(e);
 }
 }
  
 let _scannerIsRunning = false;
 function startScan() {
 if (_scannerIsRunning) return;
 document.getElementById('interactive').style.display = 'block';
  
 Quagga.init({
 inputStream: {
 name: "Live",
 type: "LiveStream",
 target: document.querySelector('#interactive'),
 constraints: {
 width: { ideal: 640 },
 height: { ideal: 480 },
 facingMode: "environment"
 },
 },
 decoder: {
 readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader"]
 },
 locate: true
 }, function (err) {
 if (err) {
 console.error(err);
 alert(err);
 return;
 }
 Quagga.start();
 _scannerIsRunning = true;
 });
  
 Quagga.onDetected(function (data) {
 if (data.codeResult && data.codeResult.code) {
 const code = data.codeResult.code;
 document.getElementById('coilNo').value = code;
 stopScan();
 handleCoilChange();
 }
 });
 }
  
 function stopScan() {
 if (!_scannerIsRunning) return;
 Quagga.stop();
 _scannerIsRunning = false;
 document.getElementById('interactive').style.display = 'none';
 }
 </script>
